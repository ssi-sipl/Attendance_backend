<!doctype html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.2/socket.io.min.js"></script>

<style>
body { margin:0; background:#f4f6f9; }

.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background:#1e293b;
    color:white;
    padding:20px;
}

.sidebar a {
    display:block;
    color:white;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
}

.sidebar a:hover { background:#334155; }

.content {
    margin-left:240px;
    padding:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<h4>⚡ System</h4>

<a href="#">Dashboard</a>
<a href="/settings">Settings</a>
<a href="/logout">Logout</a>
</div>

<div class="content">

<h3>Mark Attendance</h3>
<div class="d-flex align-items-center gap-3 mb-3">
    <button class="btn btn-success" onclick="scan()">Scan Finger</button>
    <span id="status" class="fw-semibold text-muted">Ready</span>
</div>

<h3>Attendance</h3>

<table class="table table-bordered bg-white">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Date</th>
<th>Time</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>
var socket = io();

function load() {
    fetch("/live")
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.forEach(r => {
            html += `<tr>
            <td>${r[1]}</td>
            <td>${r[2]}</td>
            <td>${r[3]}</td>
            <td>${r[4]}</td>
            </tr>`;
        });
        document.getElementById("tbody").innerHTML = html;
    });
}

function scan() {
    const status = document.getElementById("status");

    status.innerText = "Place finger...";
    status.className = "fw-semibold text-primary";

    fetch("/scan")
    .then(res => res.text())
    .then(msg => {
        status.innerText = msg;

        if (msg.includes("Welcome")) {
            status.className = "fw-semibold text-success";
        } else if (msg.includes("not") || msg.includes("Error")) {
            status.className = "fw-semibold text-danger";
        } else {
            status.className = "fw-semibold text-warning";
        }

        load(); // refresh table
    })
    .catch(() => {
        status.innerText = "Scan failed";
        status.className = "fw-semibold text-danger";
    });
}
load();

socket.on("new_attendance", load);
socket.on("update", load);
</script>

</body>
</html>
