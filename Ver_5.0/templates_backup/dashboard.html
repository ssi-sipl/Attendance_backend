<!doctype html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.2/socket.io.min.js"></script>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Attendance System</span>
    <div>
        <a class="btn btn-warning me-2" href="/settings">Settings</a>
        <a class="btn btn-danger" href="/logout">Logout</a>
    </div>
</nav>

<div class="container mt-3">

<h3>Fingerprint Scanner</h3>
<p>Select user and simulate scan:</p>

<form method="GET" onsubmit="this.action='/scan/' + this.user_id.value;">
    <input type="number" name="user_id" class="form-control w-25 d-inline" placeholder="User ID" required>
    <button class="btn btn-success">Scan Fingerprint</button>
</form>

<hr>

<h3>Live Attendance</h3>

<table class="table table-bordered">
<thead>
<tr>
<th>User ID</th>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>
var socket = io();

function loadTable() {
    fetch('/live')
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("tbody");
        let html = "";

        data.forEach(row => {
            html += `
            <tr>
                <td>${row[1]}</td>
                <td>${row[2]}</td>
                <td>${row[3]}</td>
                <td>${row[4]}</td>
                <td>
                    <form onsubmit="deleteRow(event, ${row[0]})">
                        <button class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>`;
        });

        tbody.innerHTML = html;
    });
}

function deleteRow(e, id) {
    e.preventDefault();
    fetch(`/delete_attendance/${id}`, { method: "POST" })
    .then(() => loadTable());
}

loadTable();

socket.on("update", loadTable);
socket.on("new_attendance", loadTable);
</script>

</body>
</html>
