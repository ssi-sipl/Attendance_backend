<!doctype html>
<html>
<head>
<title>Settings</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.2/socket.io.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
<h3>Settings</h3>

<h5>Active Users</h5>
<ul class="list-group mb-3">
{% for uid, name in active %}
<li class="list-group-item d-flex justify-content-between">

{{ name }}

<form method="POST" class="d-flex gap-1">
<input type="hidden" name="user_id" value="{{ uid }}">

<button class="btn btn-info btn-sm" name="action" value="enroll">Enroll</button>
<button class="btn btn-warning btn-sm" name="action" value="deactivate">Deactivate</button>
<button class="btn btn-danger btn-sm" name="action" value="delete_attendance">Del Att</button>
<button class="btn btn-danger btn-sm" name="action" value="delete_fingerprint">Del FP</button>
<button class="btn btn-dark btn-sm" name="action" value="delete_all">Full</button>

</form>
</li>
{% endfor %}
</ul>

<h5>Inactive Users</h5>
<ul class="list-group mb-3">
{% for uid, name in inactive %}
<li class="list-group-item d-flex justify-content-between">

{{ name }}

<form method="POST">
<input type="hidden" name="user_id" value="{{ uid }}">
<button class="btn btn-success btn-sm" name="action" value="activate">Activate</button>
</form>

</li>
{% endfor %}
</ul>

<h5>Add User</h5>
<form method="POST">
<input type="text" name="name" class="form-control mb-2" required>
<button class="btn btn-primary" name="action" value="add">Add</button>
</form>

<a class="btn btn-secondary mt-3" href="/dashboard">Back</a>

</div>

<script>
var socket = io();
socket.on("update", () => location.reload());
</script>

</body>
</html>
